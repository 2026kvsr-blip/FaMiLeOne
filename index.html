<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>oneFaMiLe</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<!-- TOP BAR -->

<header class="topbar">

<div class="menu-btn">
<i class="fa-solid fa-bars"></i>
</div>

<div class="app-title">
oneFaMiLe
</div>

<div class="language">

<select id="lang">

<option>English</option>

<option>తెలుగు</option>

<option>हिन्दी</option>

<option>ಕನ್ನಡ</option>

<option>தமிழ்</option>

<option>മലയാളം</option>

</select>

</div>

</header>

<!-- WELCOME -->

<section class="welcome-box">

<h2>Welcome to oneFaMiLe</h2>

<p>

oneFaMiLe<br>

one StRuCtUrE<br>

one CoDe

</p>

</section>


<!-- LOGIN SIGNUP -->

<section class="auth-buttons">

<button id="loginBtn">

Login

</button>

<button id="signupBtn">

SignUp

</button>

</section>


<!-- LOGIN AREA -->

<section id="loginArea"
class="hidden">

<input
type="tel"

placeholder="Mobile Number">

<button>

Send OTP

</button>

<input

type="text"

placeholder="OTP">

<button>

Verify OTP

</button>

</section>


<!-- SIGNUP AREA -->

<section

id="signupArea"

class="hidden">

<input

type="tel"

placeholder="Mobile Number">


<button>

Send OTP

</button>


<input

type="text"

placeholder="OTP">


<button>

Verify OTP

</button>


<input

type="password"

maxlength="6"

placeholder="Sensitive Pass Code">


<input

type="password"

maxlength="6"

placeholder="Confirm Pass Code">


<button>

Register

</button>

</section>



<!-- TOP MODULE CONTAINER -->

<div class="top-container">

<div class="top-buttons">

<button class="module-btn">

Expenses

</button>

<button class="module-btn">

Activities

</button>

<button class="module-btn">

Loans

</button>

<button class="module-btn">

Income

</button>

<button class="module-btn">

Health

</button>

</div>

</div>


<!-- PAGE AREA -->

<main>

<section id="homePage">

<h3>

HOME PAGE

</h3>

</section>

</main>



<!-- BOTTOM BAR -->

<footer>

<div class="bottom-container">

<button class="bottom-btn active">

Home

</button>

<button class="bottom-btn">

Family Tree

</button>

<button class="bottom-btn">

Memories

</button>

<button class="bottom-btn">

Charts

</button>

<button class="bottom-btn">

Reports

</button>

</div>

</footer>



<!-- MENU -->

<div

id="menuPanel"

class="menu-panel hidden">

<button id="exitBtn">

Exit

</button>

</div>



<!-- EXIT MESSAGE -->

<div

id="exitMessage"

class="hidden">

Scroll from bottom to top

to close the app

</div>


<script src="js/app.js"></script>

</body>

</html>
