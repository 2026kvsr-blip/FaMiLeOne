<!DOCTYPE html>
<html lang="en">

<head>
  
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>oneFaMiLe</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>


  
<!-- TOP BAR -->

<header class="topbar">

<div class="menu-btn">

<i class="fa-solid fa-bars"></i>

</div>


<div class="app-title">

oneFaMiLe

</div>


<div class="language">

<select>

<option>English</option>

<option>తెలుగు</option>

<option>हिन्दी</option>

<option>ಕನ್ನಡ</option>

<option>தமிழ்</option>

<option>മലയാളം</option>

</select>

</div>

</header>



<!-- WELCOME SCREEN -->

<section id="welcomePage">

<div class="welcome-box">

<h2>

Welcome to oneFaMiLe

</h2>

<p>

oneFaMiLe

<br>

one StRuCtUrE

<br>

one CoDe

</p>

</div>



<div class="auth-buttons">

<button id="loginBtn">

Login

</button>


<button id="signupBtn">

SignUp

</button>

</div>

</section>



<!-- LOGIN SCREEN -->

<section

id="loginPage"

class="hidden">

<h3>

Mobile Number

</h3>


<input

type="tel"

placeholder="Enter Mobile Number">


<button

id="sendOTPBtn">

Send OTP

</button>


<button

id="backLoginBtn">

← Back

</button>

</section>




<!-- OTP SCREEN -->

<section

id="otpPage"

class="hidden">

<h3>

Verify OTP

</h3>


<input

type="text"

placeholder="Enter OTP">


<button

id="verifyOTPBtn">

Verify OTP

</button>


<button

id="backOTPBtn">

← Back

</button>

</section>

<!-- SIGNUP -->

<section
id="signupPage"
class="hidden">

<h3>

Mobile Number

</h3>

<input
type="tel"
placeholder="Enter Mobile Number">


<button
id="signupOTPBtn">

Send OTP

</button>


<button
id="backSignupBtn">

← Back

</button>

</section>
<!-- SIGNUP OTP -->

<section
id="signupOTPPage"
class="hidden">

<h3>

Verify OTP

</h3>


<input
type="text"
placeholder="Enter OTP">


<input
maxlength="6"
type="password"
placeholder="Sensitive Pass Code">


<input
maxlength="6"
type="password"
placeholder="Confirm Pass Code">


<button
id="registerBtn">

Register

</button>


<button
id="backSignupOTPBtn">

← Back

</button>

</section>



  
<!-- DASHBOARD -->

<section

id="dashboard"

class="hidden">


<div

id="topContainer"

class="top-container">

<button id="expensesBtn">

Expenses

</button>


<button id="activitiesBtn">

Activities

</button>


<button id="loansBtn">

Loans

</button>


<button id="incomeBtn">

Income

</button>


<button id="healthBtn">

Health

</button>

</div>


<div
id="homeContent"
class="home-message">

HOME PAGE

</div>





<div class="bottom-container">

<button
id="homeBtn"
class="active">

Home

</button>


<button
id="familyBtn">

Family Tree

</button>


<button
id="memoriesBtn">

Memories

</button>


<button
id="chartsBtn">

Charts

</button>

<button
id="reportsBtn">

Reports

</button>

</div>


</section>



<script src="js/app.js"></script>

</body>

</html>
