<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oneFaMiLe V5</title>
    <link rel="stylesheet" href="style.css">
    <!-- ఐకాన్స్ కోసం FontAwesome లింక్ -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    
    <!-- Splash Screen -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <div class="app-logo">
                <i class="fa-solid fa-people-roof"></i>
            </div>
            <h1 class="app-title">one<span>FaMiLe</span></h1>
        </div>
    </div>

    <!-- Login Screen (OTP UI) -->
    <div id="login-screen" class="screen">
        <div class="glass-card">
            <h2>లాగిన్ అవ్వండి</h2>
            <p>మీ మొబైల్ నంబర్ ఎంటర్ చేయండి</p>
            <div class="input-group">
                <span class="prefix">+91</span>
                <input type="tel" id="phone-number" placeholder="9876543210" maxlength="10">
            </div>
            <button id="send-otp-btn" class="main-btn">OTP పంపండి</button>

            <div id="otp-area" class="hidden">
                <p class="mt-20">OTP ని ఎంటర్ చేయండి</p>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                </div>
                <button id="verify-otp-btn" class="main-btn success-btn">వెరిఫై & లాగిన్</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Screen -->
    <div id="main-screen" class="screen">
        <!-- Header -->
        <header class="app-header">
            <div class="user-profile">
                <i class="fa-solid fa-circle-user"></i>
                <span>నమస్తే, వన్ ఫ్యామిలీ!</span>
            </div>
            <button id="logout-btn" class="icon-btn"><i class="fa-solid fa-right-from-bracket"></i></button>
        </header>

        <!-- Main Content Area -->
        <main id="content-area">
            <!-- Home View -->
            <div id="home-view" class="view active">
                <!-- 2x2 Circular Buttons Grid -->
                <div class="circular-grid">
                    <button class="circle-item" onclick="switchView('expenses')">
                        <div class="circle-icon icon-red"><i class="fa-solid fa-wallet"></i></div>
                        <span>Expenses</span>
                    </button>
                    <button class="circle-item" onclick="switchView('activities')">
                        <div class="circle-icon icon-blue"><i class="fa-solid fa-bolt"></i></div>
                        <span>Activities</span>
                    </button>
                    <button class="circle-item" onclick="switchView('loans')">
                        <div class="circle-icon icon-green"><i class="fa-solid fa-hand-holding-dollar"></i></div>
                        <span>Loans</span>
                    </button>
                    <button class="circle-item" onclick="switchView('health')">
                        <div class="circle-icon icon-purple"><i class="fa-solid fa-heart-pulse"></i></div>
                        <span>Health</span>
                    </button>
                </div>
            </div>

            <!-- Expenses View -->
            <div id="expenses-view" class="view">
                <div class="view-header">
                    <h3><i class="fa-solid fa-wallet"></i> Expenses Module</h3>
                </div>
                <div class="glass-card">
                    <p>ఖర్చుల వివరాలు ఇక్కడ చూసుకోవచ్చు.</p>
                </div>
            </div>

            <!-- Activities View -->
            <div id="activities-view" class="view">
                <div class="view-header">
                    <h3><i class="fa-solid fa-bolt"></i> Activities Module</h3>
                </div>
                <div class="glass-card">
                    <p>రోజువారీ పనుల వివరాలు ఇక్కడ ఉంటాయి.</p>
                </div>
            </div>

            <!-- Loans View -->
            <div id="loans-view" class="view">
                <div class="view-header">
                    <h3><i class="fa-solid fa-hand-holding-dollar"></i> Loans Module</h3>
                </div>
                <!-- Rectangle Buttons -->
                <div class="rect-btn-container">
                    <button class="rect-btn active"><i class="fa-solid fa-arrow-down"></i> తీసుకున్న అప్పులు</button>
                    <button class="rect-btn"><i class="fa-solid fa-arrow-up"></i> ఇచ్చిన అప్పులు</button>
                </div>
            </div>

            <!-- Health View -->
            <div id="health-view" class="view">
                <div class="view-header">
                    <h3><i class="fa-solid fa-heart-pulse"></i> Health Module</h3>
                </div>
                <div class="glass-card">
                    <p>ఆరోగ్య సమాచారం ఇక్కడ ఉంటుంది.</p>
                </div>
            </div>
        </main>

        <!-- Fixed Bottom Navigation (5 Buttons) -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('home')">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </button>
            <button class="nav-item" onclick="switchView('expenses')">
                <i class="fa-solid fa-wallet"></i>
                <span>Expenses</span>
            </button>
            <button class="nav-item" onclick="switchView('loans')">
                <i class="fa-solid fa-hand-holding-dollar"></i>
                <span>Loans</span>
            </button>
            <button class="nav-item" onclick="switchView('health')">
                <i class="fa-solid fa-heart-pulse"></i>
                <span>Health</span>
            </button>
            <button class="nav-item" onclick="switchView('activities')">
                <i class="fa-solid fa-bolt"></i>
                <span>Activities</span>
            </button>
        </nav>
    </div>

    <!-- ఇక్కడ పాత స్క్రిప్ట్ లైన్ తీసేసి ఈ కింద ఉన్న కోడ్ మొత్తం పెట్టండి -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 3 సెకన్ల తర్వాత Splash స్క్రీన్ మారుతుంది
            setTimeout(() => {
                showScreen("login-screen");
            }, 3000);

            // OTP పంపే బటన్ క్లిక్ లాజిక్
            const sendOtpBtn = document.getElementById("send-otp-btn");
            if(sendOtpBtn) {
                sendOtpBtn.addEventListener("click", () => {
                    const phone = document.getElementById("phone-number").value;
                    if(phone.length === 10) {
                        document.getElementById("otp-area").classList.remove("hidden");
                        alert("డెమో OTP పంపబడింది! (ఏదైనా 4 అంకెలు నొక్కండి)");
                    } else {
                        alert("దయచేసి 10 అంకెల మొబైల్ నంబర్ ఎంటర్ చేయండి.");
                    }
                });
            }

            // లాగిన్ వెరిఫై
            const verifyOtpBtn = document.getElementById("verify-otp-btn");
            if(verifyOtpBtn) {
                verifyOtpBtn.addEventListener("click", () => {
                    showScreen("main-screen");
                });
            }

            // లాగౌట్
            const logoutBtn = document.getElementById("logout-btn");
            if(logoutBtn) {
                logoutBtn.addEventListener("click", () => {
                    showScreen("login-screen");
                    document.getElementById("otp-area").classList.add("hidden");
                    document.getElementById("phone-number").value = "";
                });
            }
        });

        function showScreen(screenId) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            const targetScreen = document.getElementById(screenId);
            if(targetScreen) {
                targetScreen.classList.add("active");
            }
        }

        function switchView(viewId) {
            document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
            const targetView = document.getElementById(`${viewId}-view`);
            if(targetView) {
                targetView.classList.add("active");
            }

            document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
            
            const navButtons = document.querySelectorAll(".bottom-nav .nav-item");
            navButtons.forEach(btn => {
                if(btn.getAttribute("onclick").includes(viewId)) {
                    btn.classList.add("active");
                }
            });
        }
    </script>
</body>
</body>
</html>
