<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>oneFaMiLe V4</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- ==========================
     HEADER
========================== -->

<header class="app-header">

<div class="menu-icon"
onclick="toggleMenu()">

☰

</div>

<div class="logo">

<img src="images/logo.png"
alt="Logo">

<span id="appTitle">

oneFaMiLe

</span>

</div>

</header>


<!-- ==========================
     SIDE MENU
========================== -->

<nav id="menu"
class="side-menu">

<a href="#"
onclick="showHome();closeMenu();">

🏠 Home

</a>

<a href="#">

⚙ Settings

</a>

<a href="#">

🌐 Language

</a>

<a href="#">

ℹ About

</a>

<a href="#"
onclick="showExit();">

🚪 Exit

</a>

</nav>


<!-- ==========================
     TOP MENU
========================== -->

<div class="top-menu">

<div id="topButtons">

<!-- Dynamic -->

</div>

</div>


<!-- ==========================
     HOME MESSAGE
========================== -->

<div id="homeMessage">

<h2 id="welcomeText">

Welcome to oneFaMiLe

</h2>

<p id="welcomeSubText">

Manage your complete family information.

</p>

</div>


<!-- ==========================
     LANGUAGE
========================== -->

<div id="langSelect">

<select id="languageDropdown"
onchange="changeLanguage()">

<option value="en">

English

</option>

<option value="te">

తెలుగు

</option>

<option value="hi">

हिन्दी

</option>

</select>

</div>


<!-- ==========================
     MAIN CONTAINER
========================== -->

<div class="main-container">
  <!-- ==========================
     EXPENSES (g1)
========================== -->

<div id="g1" class="circle-grid"></div>


<!-- ==========================
     ACTIVITIES (g2)
========================== -->

<div id="g2" class="circle-grid"></div>


<!-- ==========================
     HEALTH (g3)
========================== -->

<div id="g3" class="circle-grid"></div>


<!-- ==========================
     LOANS (g4)
========================== -->

<div id="g4" style="display:none;">

    <!-- Loan / Payment Tabs -->

    <div class="loan-tabs">

        <button
            id="loanBtn"
            class="loan-tab-btn"
            onclick="showLoanSection('g11',this)">

            Loans

        </button>

        <button
            id="paymentBtn"
            class="loan-tab-btn"
            onclick="showLoanSection('g12',this)">

            Payments

        </button>

    </div>

    <!-- Loan Content -->

    <div
        id="loanContent"
        class="circle-grid">

    </div>

</div>


<!-- ==========================
     LOANS DATA
========================== -->

<div id="g11"
style="display:none;">

</div>


<!-- ==========================
     PAYMENTS DATA
========================== -->

<div id="g12"
style="display:none;">

</div>


<!-- ==========================
     INCOME (g10)
========================== -->

<div id="g10"
class="circle-grid">

</div>
<!-- ==========================
     FAMILY (g6)
========================== -->

<div id="g6" class="circle-grid"></div>


<!-- ==========================
     MEMORIES (g5)
========================== -->

<div id="g5" class="circle-grid"></div>


<!-- ==========================
     CHARTS (g8)
========================== -->

<div id="g8" class="circle-grid"></div>


<!-- ==========================
     REPORTS (g9)
========================== -->

<div id="g9" class="circle-grid"></div>


<!-- ==========================
     REPORT HEADER
========================== -->

<div id="reportHeader"
     class="report-header"
     style="display:none;">

    <img id="reportIcon"
         class="report-header-icon"
         src="images/report.png">

    <div id="reportTitle"
         class="report-title">

    </div>

</div>


<!-- ==========================
     ACTIVITIES STATUS MENU
========================== -->

<div id="activityStatusMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     LOAN MAIN MENU
========================== -->

<div id="loanMainMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     LOAN CATEGORY MENU
========================== -->

<div id="loanCategoryMenu"
     class="circle-grid"
     style="display:none;">

</div>


<!-- ==========================
     LOAN LIST MENU
========================== -->

<div id="loanListMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     PAYMENT MAIN MENU
========================== -->

<div id="paymentMainMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     PAYMENT CATEGORY MENU
========================== -->

<div id="paymentCategoryMenu"
     class="circle-grid"
     style="display:none;">

</div>


<!-- ==========================
     PAYMENT LIST MENU
========================== -->

<div id="paymentListMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     MEMORIES CATEGORY MENU
========================== -->

<div id="memoryCategoryMenu"
     class="report-grid"
     style="display:none;">

</div>


<!-- ==========================
     UNIVERSAL REPORT MENU
========================== -->

<div id="reportMenu"
     class="report-grid"
     style="display:none;">

</div>


  <!-- ==========================
     POPUP
========================== -->

<div id="popupOverlay"
     class="popup-overlay"
     style="display:none;">

    <div class="popup-box">

        <div id="popupTitle"
             class="popup-title">

            oneFaMiLe

        </div>

        <div id="popupMessage"
             class="popup-message">

        </div>

        <button
            class="popup-btn"
            onclick="closePopup()">

            OK

        </button>

    </div>

</div>


<!-- ==========================
     BOTTOM NAVIGATION
========================== -->

<nav class="bottom-nav">

<a href="#"
id="homeNav">

<img src="images/home.png">

<span>Home</span>

</a>


<a href="#"
id="familyNav">

<img src="images/family.png">

<span>Family</span>

</a>


<a href="#"
id="chartsNav">

<img src="images/chart.png">

<span>Charts</span>

</a>


<a href="#"
id="memoryNav">

<img src="images/memory.png">

<span>Memories</span>

</a>


<a href="#"
id="reportsNav">

<img src="images/report.png">

<span>Reports</span>

</a>

</nav>


</div>
<!-- End Main Container -->


<!-- ==========================
     JAVASCRIPT FILES
========================== -->

<script src="data.js"></script>

<script src="language.js"></script>

<script src="reports.js"></script>

<script src="menu.js"></script>

<script src="popup.js"></script>


</body>

</html>
