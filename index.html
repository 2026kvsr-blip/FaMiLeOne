<!DOCTYPE html>
<html lang="en">

<head>
 
<meta charset="UTF-8">
  
<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>oneFaMiLe</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

 
<body>

  
<!-- TOP BAR -->

<header class="topbar">

<div class="menu-btn">

<i class="fa-solid fa-bars"></i>

</div>


<div class="app-title">

oneFaMiLe

</div>


<div class="language">

<select id="languageSelect">

<option>English</option>

<option>తెలుగు</option>

<option>हिन्दी</option>

<option>ಕನ್ನಡ</option>

<option>தமிழ்</option>

<option>മലയാളം</option>

</select>

</div>

</header>



<!-- WELCOME SCREEN -->

<section id="welcomePage">

<div class="welcome-box">

<h2 id="welcomeHeading">

Welcome to oneFaMiLe

</h2>

<p id="welcomeSlogan">

oneFaMiLe
<br>
one Structure
<br>
one Code

</p>

<div id="welcomeContent">

<div id="welcomeAbout">

</div>

</div>

</div>

<div class="auth-buttons">

<button id="loginBtn">

Login

</button>


<button id="signupBtn">

SignUp

</button>

</div>

</section>



<!-- LOGIN SCREEN -->

<section

id="loginPage"

class="hidden">

<h3>

Mobile Number

</h3>


<input

type="tel"

placeholder="Enter Mobile Number">


<button

id="sendOTPBtn">

Send OTP

</button>


<button

id="backLoginBtn">

← Back

</button>

</section>




<!-- OTP SCREEN -->

<section

id="otpPage"

class="hidden">

<h3>

Verify OTP

</h3>


<input

type="text"

placeholder="Enter OTP">


<button

id="verifyOTPBtn">

Verify OTP

</button>


<button

id="backOTPBtn">

← Back

</button>

</section>

<!-- SIGNUP -->

<section
id="signupPage"
class="hidden">

<h3>

Mobile Number

</h3>

<input
type="tel"
placeholder="Enter Mobile Number">


<button
id="signupOTPBtn">

Send OTP

</button>


<button
id="backSignupBtn">

← Back

</button>

</section>
<!-- SIGNUP OTP -->

<section
id="signupOTPPage"
class="hidden">

<h3>

Verify OTP

</h3>


<input
type="text"
placeholder="Enter OTP">


<input
maxlength="6"
type="password"
placeholder="Sensitive Pass Code">


<input
maxlength="6"
type="password"
placeholder="Confirm Pass Code">


<button
id="registerBtn">

Register

</button>


<button
id="backSignupOTPBtn">

← Back

</button>

</section>



  
<!-- DASHBOARD -->

<section

id="dashboard"

class="hidden">


<div

id="topContainer"

class="top-container">

<button id="expensesBtn">

<img
src="images/Expenses.png"
data-normal="images/Expenses.png"
data-active="images/expenses-active.png"
class="nav-icon">

<span>Expenses</span>

</button>


<button id="activitiesBtn">

<img
src="images/Activities.png"
data-normal="images/Activities.png"
data-active="images/activities-active.png"

  
class="nav-icon">

<span>

Activities

</span>

</button>


<button id="loansBtn">

<img
src="images/Loans.png"
data-normal="images/Loans.png"
data-active="images/loans-active.png"
  
class="nav-icon">

<span>

Loans

</span>

</button>


<button id="incomeBtn">

<img
src="images/Income.png"
data-normal="images/Income.png"
data-active="images/income-active.png"
  
class="nav-icon">

<span>

Income

</span>

</button>


<button id="healthBtn">

<img
src="images/Health.png"
data-normal="images/Health.png"
data-active="images/health-active.png"  
class="nav-icon">

<span>

Health

</span>

</button>

</div>


<div
id="homeContent"
class="home-message">

HOME PAGE

</div>





<div class="bottom-container">

<button
id="homeBtn">

<img
src="images/Home.png"
 data-normal="images/Home.png"
data-active="images/home-active.png" 
class="nav-icon">

<span>

Home

</span>

</button>


<button
id="familyBtn">

<img
src="images/Family.png"
 data-normal="images/Family.png"
data-active="images/family-active.png" 
class="nav-icon">

<span>

Family

</span>

</button>


<button
id="memoriesBtn">

<img
src="images/Memories.png"
data-normal="images/Memories.png"
data-active="images/memories-active.png"
  
class="nav-icon">

<span>

Memories

</span>

</button>

<button
id="chartsBtn">

<img
src="images/Charts.png"
  data-normal="images/Charts.png"
data-active="images/charts-active.png"
class="nav-icon">

<span>

Charts

</span>

</button>

<button
id="reportsBtn">

<img
src="images/Reports.png"
data-normal="images/Reports.png"
data-active="images/reports-active.png"  
class="nav-icon">

<span>

Reports

</span>

</button>

</div>


</section>



<script src="js/language.js"></script>

<script src="js/app.js"></script>

</body>

</html>
